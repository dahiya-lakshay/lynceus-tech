# Two ways to run this:
#
#   docker compose up backend frontend
#     -> Runs only the API + UI (no Kafka).
#
#   docker compose --profile streaming up
#     -> Runs Kafka + Producer + Consumer + Backend + Frontend.

services:
  kafka:
    image: apache/kafka:4.1.1
    container_name: lynceus-kafka
    profiles:
      - streaming

    ports:
      - "9092:9092"

    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"
        ]
      interval: 10s
      timeout: 10s
      retries: 10

  backend:
    build:
      context: ./backend

    ports:
      - "8000:8000"

    environment:
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

    volumes:
      - ./backend/outputs:/app/outputs
      - ./backend/models:/app/models

    services:
      backend:
        volumes:
          - ./backend/models:/app/models
          - ./backend/outputs:/app/outputs

  producer:
    build:
      context: ./backend

    profiles:
      - streaming

    command:
      - python
      - -m
      - streaming.producer

    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PRODUCE_INTERVAL_SECONDS: "2.5"

    depends_on:
      kafka:
        condition: service_healthy

  consumer:
    build:
      context: ./backend

    profiles:
      - streaming

    command:
      - python
      - -m
      - streaming.consumer

    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

    volumes:
      - ./backend/outputs:/app/outputs
      - ./backend/models:/app/models

    depends_on:
      kafka:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL}

    ports:
      - "5173:80"

    depends_on:
      backend:
        condition: service_started

